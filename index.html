<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Discipline OS">
<meta name="theme-color" content="#080808">
<title>Discipline OS</title>
<style>
:root{
  --bg:#080808;--s1:#111;--s2:#1c1c1e;--s3:#2c2c2e;
  --b1:#2a2a2a;--b2:#3a3a3c;
  --t1:#f5f5f5;--t2:#8e8e93;--t3:#48484a;
  --green:#30d158;--green-dim:#1a7a33;
  --amber:#ffd60a;--amber-dim:#7a6300;
  --red:#ff453a;--blue:#0a84ff;
  --r:14px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html{height:100%;background:var(--bg);}
body{height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,'Helvetica Neue',sans-serif;overscroll-behavior:none;}
.app{display:flex;flex-direction:column;height:100vh;height:100svh;max-width:430px;margin:0 auto;position:relative;}

/* ── Header ── */
.hdr{padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.hdr-logo{font-size:17px;font-weight:700;letter-spacing:-.4px;}
.hdr-logo span{color:var(--green);}
.hdr-date{font-size:12px;color:var(--t2);background:var(--s2);border:1px solid var(--b1);border-radius:20px;padding:4px 11px;}

/* ── Tab bar ── */
.tabbar{flex-shrink:0;display:flex;background:var(--s1);border-top:1px solid var(--b1);padding:6px 0 calc(env(safe-area-inset-bottom,0px) + 6px);}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:transparent;color:var(--t3);font-size:10px;font-weight:500;cursor:pointer;padding:4px 0;transition:color .12s;}
.tb.on{color:var(--green);}
.tb svg{width:22px;height:22px;}

/* ── Content ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px;}

/* ── Stat row ── */
.stats{display:flex;gap:8px;margin:14px 0 10px;}
.stat{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:10px 12px;}
.stat-n{font-size:24px;font-weight:600;letter-spacing:-.5px;color:var(--t1);}
.stat-l{font-size:10px;color:var(--t2);margin-top:1px;letter-spacing:.02em;}

/* ── Progress ── */
.prog-wrap{height:3px;background:var(--s3);border-radius:20px;margin-bottom:12px;overflow:hidden;}
.prog{height:100%;background:var(--green);border-radius:20px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── Card ── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.card-head{padding:10px 16px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;}
.card-label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;}

/* ── Habit rows ── */
.h-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .1s;}
.h-row:last-child{border-bottom:none;}
.h-row:active{background:var(--s2);}
.h-row.dragging{opacity:.25;}
.h-row.drop-above{border-top:2px solid var(--green)!important;}
.h-row.drop-below{border-bottom:2px solid var(--green)!important;}
.h-handle{display:flex;align-items:center;padding:0 4px 0 0;flex-shrink:0;color:var(--t3);touch-action:none;cursor:grab;}
.h-handle svg{width:14px;height:14px;pointer-events:none;}
.chk{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--b2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chk.on{background:var(--green);border-color:var(--green);}
.chk.on::after{content:'';display:block;width:5px;height:9px;border:2px solid #000;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
.h-label{flex:1;font-size:15px;color:var(--t1);}
.h-label.on{color:var(--t3);text-decoration:line-through;}
.streak{font-size:11px;font-weight:600;color:#ffd60a;background:rgba(255,214,10,.12);border-radius:20px;padding:3px 8px;}
.del-btn{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;}
.del-btn:active{color:var(--red);}

/* ── Add input ── */
.add-row{display:flex;gap:8px;margin-top:6px;margin-bottom:16px;}
.add-in{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:11px 14px;font-size:15px;color:var(--t1);outline:none;-webkit-appearance:none;}
.add-in:focus{border-color:var(--green-dim);}
.add-in::placeholder{color:var(--t3);}
.add-btn{background:var(--green);border:none;border-radius:var(--rs);padding:0 18px;color:#000;font-size:15px;font-weight:700;cursor:pointer;}

/* ── Pomodoro ── */
.pomo-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0 20px;}
.pomo-ring{margin-bottom:24px;}
.pomo-btns{display:flex;gap:10px;margin-bottom:18px;}
.p-btn{height:46px;padding:0 26px;border-radius:23px;border:1px solid var(--b2);background:transparent;color:var(--t1);font-size:15px;font-weight:500;cursor:pointer;transition:all .12s;}
.p-btn.primary{background:var(--green);border-color:var(--green);color:#000;font-weight:700;}
.p-btn:active{transform:scale(.97);}
.pomo-sess{font-size:13px;color:var(--t2);margin-bottom:20px;}
.jail-btn{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:15px;font-size:14px;color:var(--t2);cursor:pointer;transition:all .15s;}
.jail-btn.hot{background:rgba(255,69,58,.08);border-color:rgba(255,69,58,.3);color:var(--red);}

/* ── Phone Jail ── */
.jail-over{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 20px;}
.jail-over.show{display:flex;}
.jail-em{font-size:64px;margin-bottom:6px;}
.jail-title{font-size:20px;font-weight:700;color:var(--t1);}
.jail-timer{font-size:64px;font-weight:200;letter-spacing:-3px;color:var(--t1);font-variant-numeric:tabular-nums;}
.jail-msg{font-size:14px;color:var(--t2);text-align:center;line-height:1.6;max-width:260px;}
.jail-quit{margin-top:12px;background:transparent;border:1px solid var(--t3);border-radius:25px;padding:11px 28px;color:var(--t3);font-size:13px;cursor:pointer;}

/* ── Tasks ── */
.sync-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 8px;}
.sync-lbl{font-size:12px;color:var(--t2);}
.sync-btn{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:6px 14px;font-size:12px;color:var(--t1);cursor:pointer;font-weight:500;}
.t-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--b1);transition:background .1s;}
.t-row:last-child{border-bottom:none;}
.t-row:active{background:var(--s2);}
.sq{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--b2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.sq.on{background:var(--green);border-color:var(--green);}
.sq.on::after{content:'';display:block;width:4px;height:7px;border:1.5px solid #000;border-top:none;border-left:none;transform:rotate(45deg) translate(-0.5px,-1px);}
.t-label{flex:1;font-size:14px;line-height:1.5;color:var(--t1);}
.t-label.on{color:var(--t3);text-decoration:line-through;}
.pri{font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;cursor:pointer;user-select:none;transition:opacity .1s;}
.pri:active{opacity:.6;}
.pri-h{background:rgba(255,69,58,.15);color:#ff6961;}
.pri-m{background:rgba(10,132,255,.12);color:#4da6ff;}
.pri-l{background:var(--s3);color:var(--t2);}
.drag-handle{display:flex;align-items:center;padding:0 6px 0 0;flex-shrink:0;opacity:.3;touch-action:none;cursor:grab;}
.drag-handle svg{width:14px;height:14px;pointer-events:none;}
.t-row.dragging{opacity:.25;}
.t-row.drop-above{border-top:2px solid var(--green)!important;}
.t-row.drop-below{border-bottom:2px solid var(--green)!important;}

/* ── Settings ── */
.s-group{margin-top:14px;margin-bottom:10px;}
.s-row{padding:13px 16px;border-bottom:1px solid var(--b1);}
.s-row:last-child{border-bottom:none;}
.s-lbl{font-size:12px;color:var(--t2);margin-bottom:6px;}
.s-in{width:100%;background:var(--s3);border:1px solid var(--b1);border-radius:var(--rs);padding:10px 13px;font-size:13px;color:var(--t1);font-family:'SF Mono','Menlo',monospace;outline:none;-webkit-appearance:none;}
.s-in:focus{border-color:var(--green-dim);}
.s-hint{font-size:11px;color:var(--t3);margin-top:6px;line-height:1.5;}
.s-save{display:block;width:100%;margin:12px 0 20px;background:var(--green);border:none;border-radius:var(--r);padding:15px;color:#000;font-size:16px;font-weight:700;cursor:pointer;}

/* ── Priority filter chips ── */
.filter-row{display:flex;gap:6px;margin-bottom:10px;padding-top:2px;}
.chip{height:30px;padding:0 14px;border-radius:15px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .12s;}
.chip.on{border-color:transparent;color:#000;}
.chip.all.on{background:var(--t1);color:#000;}
.chip.h.on{background:#ff6961;border-color:#ff6961;}
.chip.m.on{background:#4da6ff;border-color:#4da6ff;}
.chip.l.on{background:var(--t3);border-color:var(--t3);color:var(--t1);}
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:14px;line-height:1.8;}

/* ── Spinner ── */
.spin{text-align:center;padding:28px;color:var(--t2);font-size:13px;}
.spin::before{content:'';display:inline-block;width:16px;height:16px;border:2px solid var(--b2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Notion setup callout ── */
.callout{background:rgba(10,132,255,.08);border:1px solid rgba(10,132,255,.2);border-radius:var(--rs);padding:14px 16px;margin-bottom:10px;font-size:13px;color:#4da6ff;line-height:1.7;}
.callout strong{display:block;margin-bottom:4px;font-size:13px;}

/* ── Task inline edit ── */
.t-edit-in{flex:1;background:var(--s3);border:1.5px solid var(--green-dim);border-radius:7px;padding:6px 10px;font-size:14px;color:var(--t1);outline:none;min-width:0;}
.t-edit-save{background:var(--green);border:none;border-radius:7px;padding:0 12px;height:34px;color:#000;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;}
.t-edit-cancel{background:transparent;border:1px solid var(--b2);border-radius:7px;padding:0 10px;height:34px;color:var(--t2);font-size:13px;cursor:pointer;flex-shrink:0;}
.edit-btn{background:none;border:none;color:var(--t3);cursor:pointer;padding:2px 5px;font-size:14px;line-height:1;flex-shrink:0;}
.edit-btn:active{color:var(--blue);}

/* ── Study add form ── */
.study-add-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.study-add-inner{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.study-add-row{display:flex;gap:6px;align-items:stretch;width:100%;}
.study-subj-sel{flex:0 0 110px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rs);padding:0 10px;font-size:13px;color:var(--t1);outline:none;-webkit-appearance:none;height:44px;}
.study-header{display:flex;justify-content:space-between;align-items:center;padding:10px 0 8px;}
.study-title-row{font-size:12px;color:var(--t2);}
.subject-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.subject-head{padding:11px 16px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .1s;}
.subject-head:active{background:var(--s2);}
.subject-name{font-size:14px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px;}
.subject-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.subject-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--s3);color:var(--t2);}
.subject-badge.has-due{background:rgba(255,69,58,.12);color:#ff6961;}
.study-task-row{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid var(--b1);}
.study-task-row:last-child{border-bottom:none;}
.study-sq{width:19px;height:19px;border-radius:4px;border:1.5px solid var(--b2);background:transparent;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.study-sq.on{background:var(--green);border-color:var(--green);}
.study-sq.on::after{content:'';display:block;width:4px;height:7px;border:1.5px solid #000;border-top:none;border-left:none;transform:rotate(45deg) translate(-.5px,-1px);}
.study-task-info{flex:1;}
.study-task-name{font-size:14px;color:var(--t1);line-height:1.5;}
.study-task-name.on{color:var(--t3);text-decoration:line-through;}
.study-task-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center;}
.study-due{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;}
.study-due.today{background:rgba(255,69,58,.15);color:#ff6961;}
.study-due.soon{background:rgba(255,214,10,.12);color:#ffd60a;}
.study-due.ok{background:var(--s3);color:var(--t2);}
.study-pri{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;}
.study-pri.h{background:rgba(255,69,58,.15);color:#ff6961;}
.study-pri.m{background:rgba(10,132,255,.12);color:#4da6ff;}
.study-pri.l{background:var(--s3);color:var(--t2);}
.study-collapse-icon{font-size:10px;color:var(--t2);transition:transform .2s;}
.subject-card.collapsed .study-collapse-icon{transform:rotate(-90deg);}
.subject-card.collapsed .subject-tasks{display:none;}
.study-empty-sub{padding:12px 16px;font-size:13px;color:var(--t3);text-align:center;}
.study-filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.study-filter-row::-webkit-scrollbar{display:none;}
.study-chip{height:28px;padding:0 12px;border-radius:14px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.study-chip.on{background:var(--blue);border-color:var(--blue);color:#fff;}

/* ── Timetable (scoped under .tt-wrap) ── */
.tt-wrap{font-family:'Sarabun',-apple-system,sans-serif;padding-bottom:1rem;}
.tt-controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;padding-top:12px;}
.tt-btn-full{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;}
.tt-select-wrap{position:relative;flex:1;min-width:140px;}
.tt-select-wrap select{appearance:none;width:100%;padding:9px 30px 9px 12px;background:var(--s2);color:var(--t1);border:1px solid var(--b1);border-radius:10px;font-size:13px;outline:none;}
.tt-select-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--t2);}
.tt-week-toggle{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--b1);}
.tt-week-btn{padding:8px 14px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:var(--s2);color:var(--t2);display:flex;align-items:center;gap:5px;transition:all .15s;}
.tt-week-dot{width:7px;height:7px;border-radius:50%;}
.tt-week-btn.a .tt-week-dot{background:#7c3aed;}
.tt-week-btn.b .tt-week-dot{background:#0369a1;}
.tt-week-btn.a.active{background:#7c3aed;color:#fff;}
.tt-week-btn.b.active{background:#0369a1;color:#fff;}
.tt-week-divider{width:1px;background:var(--b1);}
.tt-day-heading{display:none;align-items:center;gap:10px;margin-bottom:12px;}
.tt-day-heading.visible{display:flex;}
.tt-day-pill{background:#4338ca;color:#fff;border-radius:8px;padding:5px 16px;font-size:14px;font-weight:600;}
.tt-day-en{font-size:12px;color:var(--t2);}
.tt-days{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.tt-days.single{grid-template-columns:1fr;}
.tt-days.single .tt-col{display:none;}
.tt-days.single .tt-col.active{display:block;}
.tt-col-head{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:8px 6px;text-align:center;margin-bottom:5px;}
.tt-col-head .dow{font-size:12px;font-weight:600;color:#818cf8;}
.tt-col-head .doe{font-size:9px;color:#555580;margin-top:1px;}
.tt-blocks{display:flex;flex-direction:column;gap:4px;}
.tt-wrap [data-week]{display:none;}
.tt-wrap.week-a [data-week="a"]{display:block;}
.tt-wrap.week-b [data-week="b"]{display:block;}
/* subject cards */
.tt-card{border-radius:10px;overflow:hidden;border:1px solid transparent;}
.tt-card-inner{padding:8px 10px;}
.tt-days.single .tt-card-inner{padding:11px 14px;}
.tt-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:4px;}
.tt-time{font-size:9px;font-weight:500;opacity:.7;}
.tt-days.single .tt-time{font-size:11px;}
.tt-credit{font-size:9px;font-weight:700;background:rgba(0,0,0,.12);border-radius:4px;padding:1px 5px;white-space:nowrap;}
.tt-days.single .tt-credit{font-size:11px;}
.tt-wbadge{font-size:8px;font-weight:700;letter-spacing:.06em;border-radius:4px;padding:1px 5px;}
.tt-wrap.week-a .tt-wbadge,.tt-wrap.week-b .tt-wbadge{background:#7c3aed;color:#fff;}
[data-week="b"] .tt-wbadge{background:#0369a1!important;color:#fff!important;}
.tt-code{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px;}
.tt-days.single .tt-code{font-size:11px;}
.tt-name{font-size:11px;font-weight:600;line-height:1.4;margin-bottom:3px;}
.tt-days.single .tt-name{font-size:14px;}
.tt-teacher{font-size:10px;opacity:.8;}
.tt-days.single .tt-teacher{font-size:12px;}
.tt-room{font-size:9px;opacity:.6;margin-top:2px;}
.tt-room::before{content:'📍 ';font-size:8px;}
.tt-days.single .tt-room{font-size:11px;}
/* subject colors */
.tt-bio{background:linear-gradient(145deg,#064e3b,#065f46);border-color:#10b981;color:#a7f3d0;}
.tt-phy{background:linear-gradient(145deg,#1e3a5f,#1e40af);border-color:#3b82f6;color:#bfdbfe;}
.tt-mth{background:linear-gradient(145deg,#451a03,#78350f);border-color:#f59e0b;color:#fde68a;}
.tt-tha{background:linear-gradient(145deg,#450a0a,#7f1d1d);border-color:#ef4444;color:#fecaca;}
.tt-eng{background:linear-gradient(145deg,#1e1b4b,#312e81);border-color:#818cf8;color:#ddd6fe;}
.tt-soc{background:linear-gradient(145deg,#052e16,#14532d);border-color:#22c55e;color:#bbf7d0;}
.tt-art{background:linear-gradient(145deg,#4a0520,#831843);border-color:#ec4899;color:#fbcfe8;}
.tt-hpe{background:linear-gradient(145deg,#431407,#7c2d12);border-color:#f97316;color:#fed7aa;}
.tt-sci{background:linear-gradient(145deg,#1e293b,#334155);border-color:#64748b;color:#e2e8f0;}
.tt-com{background:linear-gradient(145deg,#082f49,#0c4a6e);border-color:#38bdf8;color:#bae6fd;}
.tt-kor{background:linear-gradient(145deg,#422006,#713f12);border-color:#ca8a04;color:#fef08a;}
.tt-act{background:var(--s2);border:1px dashed var(--b1);border-radius:10px;padding:7px 10px;color:var(--t3);font-size:9px;}
.tt-days.single .tt-act{font-size:12px;padding:9px 12px;}
.tt-lunch{background:linear-gradient(145deg,#1c1800,#2d2400);border:1px solid #854d0e;border-radius:10px;padding:7px 10px;text-align:center;color:#fde047;font-size:9px;font-weight:600;}

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const DEFAULT_HABITS=[
  {id:1,n:'ทบทวนวิชา 1 ชั่วโมง'},
  {id:2,n:'ไม่แตะโทรศัพท์ระหว่าง focus'},
  {id:3,n:'ออกกำลังกาย'},
  {id:4,n:'นอนก่อน 23:00'},
  {id:5,n:'วางแผนวันถัดไปก่อนนอน'},
];
let S={
  tab:'tasks',
  priFilter:'all',
  habits:null,
  comps:{},       // {YYYY-MM-DD:[id,...]}
  nTasks:[],      // notion tasks
  pomo:{run:false,mode:'focus',sec:25*60,sess:0},
  jail:false,
  cfg:{token:'',dbId:'9e00343d-7302-40ba-ae96-edbfce8f6a1f',workerUrl:'',studyDbId:''},
  sync:{status:'ยังไม่ได้ sync',at:null,loading:false},
  studyTasks:[],
  studySubjects:[],   // [{name, dbId}] — populated on sync
  studySync:{status:'ยังไม่ได้ sync',at:null,loading:false},
  studyFilter:'all',
  studyCollapsed:{},
  editingTaskId:null, // id of task being inline-edited
  _tmr:null
};

// ═══════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('disc-os-v1')||'{}');
    S.habits=d.habits||JSON.parse(JSON.stringify(DEFAULT_HABITS));
    S.comps=d.comps||{};
    S.nTasks=d.nTasks||[];
    S.studyTasks=d.studyTasks||[];
    S.studySubjects=d.studySubjects||[];
    S.studyCollapsed=d.studyCollapsed||{};
    S.pomo.sess=d.sess||0;
    if(d.cfg)Object.assign(S.cfg,d.cfg);
    if(d.syncAt){S.sync.at=d.syncAt;S.sync.status='sync '+relTime(d.syncAt);}
    if(d.studySyncAt){S.studySync.at=d.studySyncAt;S.studySync.status='sync '+relTime(d.studySyncAt);}
  }catch{S.habits=JSON.parse(JSON.stringify(DEFAULT_HABITS));}
}
function save(){
  try{localStorage.setItem('disc-os-v1',JSON.stringify({
    habits:S.habits,comps:S.comps,nTasks:S.nTasks,sess:S.pomo.sess,
    cfg:S.cfg,syncAt:S.sync.at,
    studyTasks:S.studyTasks,studySubjects:S.studySubjects,studySyncAt:S.studySync.at,studyCollapsed:S.studyCollapsed
  }));}catch{}
}
function relTime(iso){
  if(!iso)return'';
  const m=(Date.now()-new Date(iso))/60000;
  if(m<2)return'เมื่อกี้';
  if(m<60)return Math.round(m)+' นาทีที่แล้ว';
  return Math.round(m/60)+' ชม.ที่แล้ว';
}
function today(){return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});}
function thaiDate(){
  return new Date().toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short'});
}
function fmt(s){
  return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}

// ═══════════════════════════════════════
//  HABITS
// ═══════════════════════════════════════
function getStreak(id){
  let n=0,d=new Date();d.setDate(d.getDate()-1);
  while(n<365){
    const k=d.toISOString().slice(0,10);
    if(!(S.comps[k]||[]).includes(id))break;
    n++;d.setDate(d.getDate()-1);
  }
  if((S.comps[today()]||[]).includes(id))n++;
  return n;
}
function toggleHabit(id){
  const t=today(),c=S.comps[t]||[];
  S.comps[t]=c.includes(id)?c.filter(x=>x!==id):[...c,id];
  save();render();
}
function delHabit(id,e){e.stopPropagation();S.habits=S.habits.filter(h=>h.id!==id);save();render();}
function addHabit(){
  const el=document.getElementById('h-in');
  if(!el||!el.value.trim())return;
  S.habits.push({id:Date.now(),n:el.value.trim()});el.value='';
  save();render();
}

// ═══════════════════════════════════════
//  POMODORO
// ═══════════════════════════════════════
function startPomo(){
  clearInterval(S._tmr);S.pomo.run=true;
  S._tmr=setInterval(()=>{
    if(S.pomo.sec<=1){
      clearInterval(S._tmr);S.pomo.run=false;
      const wasFocus=S.pomo.mode==='focus';
      if(wasFocus){S.pomo.sess++;save();}
      S.pomo.mode=wasFocus?'break':'focus';
      S.pomo.sec=S.pomo.mode==='focus'?S.cfg.pDur*60:S.cfg.bDur*60;
      if(S.jail){exitJail();}
      render();return;
    }
    S.pomo.sec--;tickUI();
  },1000);render();
}
function stopPomo(){clearInterval(S._tmr);S.pomo.run=false;render();}
function resetPomo(){clearInterval(S._tmr);S.pomo.run=false;S.pomo.mode='focus';S.pomo.sec=S.cfg.pDur*60;render();}
function swapMode(){
  clearInterval(S._tmr);S.pomo.run=false;
  S.pomo.mode=S.pomo.mode==='focus'?'break':'focus';
  S.pomo.sec=S.pomo.mode==='focus'?S.cfg.pDur*60:S.cfg.bDur*60;
  render();
}
function enableJail(){
  if(!S.pomo.run){alert('กด เริ่ม ก่อนนะ 🙂');return;}
  S.jail=true;
  document.getElementById('jail').classList.add('show');
  tickUI();
}
function exitJail(){
  S.jail=false;stopPomo();
  document.getElementById('jail').classList.remove('show');
}
function tickUI(){
  const t=fmt(S.pomo.sec);
  const te=document.getElementById('pomo-t');
  const je=document.getElementById('jail-t');
  const arc=document.getElementById('parc');
  if(te)te.textContent=t;
  if(je)je.textContent=t;
  if(arc){
    const tot=S.pomo.mode==='focus'?S.cfg.pDur*60:S.cfg.bDur*60;
    const pct=1-S.pomo.sec/tot;
    const r=85,c=2*Math.PI*r;
    arc.setAttribute('stroke-dashoffset',c*(1-pct));
  }
}

// ── Habit Drag & Drop ──
let HD={on:false,id:null,ghost:null,src:null,over:null,pos:'above',startY:0,originTop:0,touchY:0,rafId:null};

function initHabitDrag(){
  document.querySelectorAll('[data-hdrag]').forEach(h=>{
    h.addEventListener('touchstart',e=>hDragStart(e,h.dataset.hdrag),{passive:false});
  });
}

function hDragStart(e,id){
  e.preventDefault();
  const row=document.querySelector(`.h-row[data-hid="${id}"]`);
  if(!row)return;
  const touch=e.touches[0];
  const rect=row.getBoundingClientRect();
  const g=row.cloneNode(true);
  g.style.cssText=`position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;`+
    `z-index:999;pointer-events:none;background:#2c2c2e;border-radius:10px;`+
    `box-shadow:0 12px 40px rgba(0,0,0,.6);opacity:.9;`;
  document.body.appendChild(g);
  HD={on:true,id,ghost:g,src:row,over:null,pos:'above',startY:touch.clientY,originTop:rect.top,touchY:touch.clientY,rafId:null};
  row.classList.add('dragging');
  document.addEventListener('touchmove',hDragMove,{passive:false});
  document.addEventListener('touchend',hDragEnd,{passive:true});
}

function hDragMove(e){
  if(!HD.on)return;
  e.preventDefault();
  HD.touchY=e.touches[0].clientY;
  HD.ghost.style.top=(HD.originTop+(HD.touchY-HD.startY))+'px';
  cancelAnimationFrame(HD.rafId);
  HD.rafId=requestAnimationFrame(()=>{
    const rows=[...document.querySelectorAll('.h-row[data-hid]')];
    rows.forEach(r=>r.classList.remove('drop-above','drop-below'));
    let found=null,pos='above';
    for(const r of rows){
      if(r===HD.src)continue;
      const b=r.getBoundingClientRect();
      if(HD.touchY>=b.top&&HD.touchY<=b.bottom){
        found=r;pos=HD.touchY<b.top+b.height/2?'above':'below';break;
      }
    }
    if(found)found.classList.add(pos==='above'?'drop-above':'drop-below');
    HD.over=found;HD.pos=pos;
  });
}

function hDragEnd(){
  if(!HD.on)return;
  HD.on=false;
  document.removeEventListener('touchmove',hDragMove);
  document.removeEventListener('touchend',hDragEnd);
  cancelAnimationFrame(HD.rafId);
  if(HD.ghost)HD.ghost.remove();
  document.querySelectorAll('.h-row').forEach(r=>r.classList.remove('dragging','drop-above','drop-below'));
  if(HD.over&&HD.over!==HD.src){
    const toId=parseInt(HD.over.dataset.hid);
    const fi=S.habits.findIndex(h=>h.id===parseInt(HD.id));
    const ti=S.habits.findIndex(h=>h.id===toId);
    if(fi!==-1&&ti!==-1){
      const [moved]=S.habits.splice(fi,1);
      const ins=HD.pos==='above'?ti:ti+1;
      S.habits.splice(fi<ti?ins-1:ins,0,moved);
      save();
    }
  }
  HD={on:false,id:null,ghost:null,src:null,over:null,pos:'above',startY:0,originTop:0,touchY:0,rafId:null};
  render();
}

// ═══════════════════════════════════════
//  NOTION via Cloudflare Worker proxy
// ═══════════════════════════════════════
async function notionFetch(path, method, body){
  const base = (S.cfg.workerUrl||'').replace(/\/$/,'');
  if(!base) throw new Error('ยังไม่ได้ตั้งค่า Worker URL');
  const headers = {
    'Notion-Version':'2022-06-28',
    'Content-Type':'application/json',
  };
  // Only send token if set in app (optional if worker has NOTION_TOKEN secret)
  if(S.cfg.token) headers['Authorization'] = 'Bearer '+S.cfg.token;
  const r = await fetch(base + path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await r.json();
  if(!r.ok) throw new Error(data.message || r.status);
  return data;
}

async function syncNotion(){
  if(!S.cfg.workerUrl){alert('กรอก Worker URL ใน Settings ก่อน');go('settings');return;}
  S.sync.loading=true;S.sync.status='กำลัง sync...';render();
  try{
    const data = await notionFetch('/databases/'+S.cfg.dbId+'/query','POST',{
      filter:{and:[
        {property:'Done',checkbox:{equals:false}},
        {property:'Date',date:{equals:today()}}
      ]},
      sorts:[{property:'priority',direction:'descending'}],
      page_size:50
    });
    S.nTasks = data.results.map(p=>({
      id: p.id,
      title: p.properties.Name?.title?.[0]?.plain_text || '(ไม่มีชื่อ)',
      done: false,
      priority: p.properties.priority?.status?.name || '!',
      date: p.properties.Date?.date?.start || null
    }));
    S.sync.at = new Date().toISOString();
    S.sync.status = 'sync '+relTime(S.sync.at);
    save();
  }catch(e){
    S.sync.status = 'Error: '+e.message;
  }
  S.sync.loading=false;render();
}

async function doneNotion(id){doneTask(id);}

// ═══════════════════════════════════════
//  STUDY PLANNER (Notion) — 2-level fetch
//  Domain DB → subject pages → task DBs inside each page
// ═══════════════════════════════════════
async function syncStudy(){
  if(!S.cfg.workerUrl){alert('กรอก Worker URL ใน Settings ก่อน');go('settings');return;}
  if(!S.cfg.studyDbId){alert('กรอก Study Planner Database ID ใน Settings ก่อน');go('settings');return;}
  S.studySync.loading=true;S.studySync.status='กำลังดึงวิชา...';render();
  try{
    // ── Step 1: ดึงรายชื่อ subject pages จาก Domain DB ──
    const domainData=await notionFetch('/databases/'+S.cfg.studyDbId+'/query','POST',{page_size:50});
    const subjects=domainData.results.map(p=>({
      id:p.id,
      name:p.properties.Name?.title?.[0]?.plain_text
        ||p.properties.title?.title?.[0]?.plain_text
        ||'(ไม่มีชื่อ)'
    }));

    // ── Step 2: ดึง tasks จากแต่ละ subject page ──
    const allTasks=[];
    const subjMap=[]; // [{name, dbId}]
    for(const subj of subjects){
      S.studySync.status=`กำลังดึง "${subj.name}"...`;render();
      try{
        // ดึง child blocks ของ subject page
        const childData=await notionFetch('/blocks/'+subj.id+'/children?page_size=50','GET');
        const dbBlocks=(childData.results||[]).filter(b=>b.type==='child_database');

        // query แต่ละ task database ที่พบ
        for(const db of dbBlocks){
          // เก็บ mapping subject → dbId สำหรับการ add task
          if(!subjMap.find(s=>s.name===subj.name))
            subjMap.push({name:subj.name,dbId:db.id,pageId:subj.id});
          try{
            const taskData=await notionFetch('/databases/'+db.id+'/query','POST',{
              filter:{property:'Done',checkbox:{equals:false}},
              sorts:[{property:'Due',direction:'ascending'}],
              page_size:100
            });
            (taskData.results||[]).forEach(p=>{
              const props=p.properties;
              allTasks.push({
                id:p.id,
                title:props.Name?.title?.[0]?.plain_text
                  ||props.Task?.title?.[0]?.plain_text
                  ||props.ชื่องาน?.title?.[0]?.plain_text
                  ||'(ไม่มีชื่อ)',
                subject:subj.name,
                due:props.Due?.date?.start||props.Date?.date?.start||props.Deadline?.date?.start||null,
                priority:props.Priority?.select?.name||props.priority?.status?.name||'',
                done:false,
              });
            });
          }catch(dbErr){
            console.warn('Task DB error in',subj.name,dbErr.message);
          }
        }
      }catch(childErr){
        console.warn('Children error for',subj.name,childErr.message);
      }
    }

    // บันทึก subject mapping ไว้ใช้ตอน add task
    S.studySubjects=subjMap;

    // เรียงตาม due date (null อยู่ท้าย)
    allTasks.sort((a,b)=>{
      if(!a.due&&!b.due)return 0;
      if(!a.due)return 1;
      if(!b.due)return -1;
      return new Date(a.due)-new Date(b.due);
    });

    S.studyTasks=allTasks;
    S.studySync.at=new Date().toISOString();
    S.studySync.status=`sync ${relTime(S.studySync.at)} · ${allTasks.length} tasks`;
    save();
  }catch(e){
    S.studySync.status='Error: '+e.message;
    console.error('syncStudy error:',e);
  }
  S.studySync.loading=false;render();
}

function doneStudyTask(id){
  S.studyTasks=S.studyTasks.map(t=>t.id===id?{...t,done:true}:t);
  save();render();
  const t=S.studyTasks.find(x=>x.id===id);
  if(t&&S.cfg.workerUrl){
    notionFetch('/pages/'+id,'PATCH',{properties:{Done:{checkbox:true}}}).catch(()=>{});
  }
}

async function addStudyTask(){
  const subjEl=document.getElementById('study-add-subj');
  const titleEl=document.getElementById('study-add-title');
  if(!subjEl||!titleEl||!titleEl.value.trim())return;
  const subjName=subjEl.value;
  const title=titleEl.value.trim();
  const subj=S.studySubjects.find(s=>s.name===subjName);
  const tmpId='study-local-'+Date.now();
  S.studyTasks.unshift({id:tmpId,title,subject:subjName,due:today(),priority:'',done:false,local:true});
  titleEl.value='';
  save();render();
  if(subj&&S.cfg.workerUrl){
    try{
      const res=await notionFetch('/pages','POST',{
        parent:{database_id:subj.dbId},
        properties:{
          Name:{title:[{text:{content:title}}]},
          Done:{checkbox:false},
          Due:{date:{start:today()}}
        }
      });
      if(res.id){
        S.studyTasks=S.studyTasks.map(t=>t.id===tmpId?{...t,id:res.id,local:false}:t);
        save();render();
      }
    }catch(e){console.warn('Study add failed:',e.message);}
  }
}

// ── Task inline edit ──
function editTask(id){
  S.editingTaskId=String(id);
  render();setTimeout(initDrag,10);
  setTimeout(()=>{
    const el=document.getElementById('t-edit-'+id);
    if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}
  },30);
}
function cancelEditTask(){S.editingTaskId=null;render();setTimeout(initDrag,10);}
function saveEditTask(id){
  const el=document.getElementById('t-edit-'+id);
  if(!el)return;
  const newTitle=el.value.trim();
  if(!newTitle){cancelEditTask();return;}
  S.nTasks=S.nTasks.map(t=>String(t.id)===String(id)?{...t,title:newTitle}:t);
  S.editingTaskId=null;
  save();render();setTimeout(initDrag,10);
  const t=S.nTasks.find(x=>String(x.id)===String(id));
  if(t&&!t.local&&S.cfg.workerUrl){
    notionFetch('/pages/'+id,'PATCH',{
      properties:{Name:{title:[{text:{content:newTitle}}]}}
    }).catch(()=>{});
  }
}

function toggleStudyCollapse(subj){
  S.studyCollapsed[subj]=!S.studyCollapsed[subj];
  save();render();
}

function setStudyFilter(f){S.studyFilter=f;render();}

// สีสำหรับแต่ละวิชา (hashed จากชื่อ)
const SUBJ_COLORS=['#10b981','#3b82f6','#f59e0b','#ef4444','#818cf8','#22c55e','#ec4899','#f97316','#64748b','#38bdf8','#ca8a04','#a78bfa','#fb7185','#34d399'];
function subjColor(name){
  let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xfffff;
  return SUBJ_COLORS[h%SUBJ_COLORS.length];
}
function dueBadge(due){
  if(!due)return'';
  const t=today();
  const diff=(new Date(due)-new Date(t))/86400000;
  const label=due===t?'วันนี้':diff<0?`เลย ${Math.abs(Math.round(diff))} วัน`:diff===1?'พรุ่งนี้':`${Math.round(diff)} วัน`;
  const cls=diff<0?'today':diff<=2?'soon':'ok';
  return`<span class="study-due ${cls}">📅 ${label}</span>`;
}
function studyPriBadge(p){
  if(p==='!!!'||p==='High')return`<span class="study-pri h">!!!</span>`;
  if(p==='!!'||p==='Medium')return`<span class="study-pri m">!!</span>`;
  return``;
}

function rStudy(){
  // filter เฉพาะ done=false (ไม่ filter ตาม date)
  const activeTasks=S.studyTasks.filter(t=>!t.done);

  // รายชื่อวิชาจาก studySubjects (sync'd) + จาก tasks ที่มีอยู่
  const allSubjNames=[...new Set([
    ...S.studySubjects.map(s=>s.name),
    ...activeTasks.map(t=>t.subject)
  ])].sort();

  // filter chip ตามวิชา
  const filtered=S.studyFilter==='all'?activeTasks:activeTasks.filter(t=>t.subject===S.studyFilter);
  const groupBySubj=allSubjNames.reduce((acc,s)=>{
    acc[s]=filtered.filter(t=>t.subject===s);
    return acc;
  },{});

  // tasks ด่วน (due วันนี้หรือเลย)
  const urgentCount=activeTasks.filter(t=>t.due&&new Date(t.due)<=new Date(today())).length;

  // subject dropdown สำหรับ add form
  const hasSubjects=allSubjNames.length>0;

  return`
<div class="study-header">
  <span class="study-title-row">📚 study · ${S.studySync.status}${urgentCount>0?` · <span style="color:var(--red);font-weight:600">${urgentCount} ด่วน</span>`:''}</span>
  <button class="sync-btn" onclick="syncStudy()">↻ Sync</button>
</div>

${hasSubjects?`
<div class="study-add-wrap">
  <div class="study-add-inner">
    <div class="study-add-row">
      <select class="study-subj-sel" id="study-add-subj">
        ${allSubjNames.map(s=>`<option value="${s.replace(/"/g,'&quot;')}">${s}</option>`).join('')}

      <input class="add-in" id="study-add-title" placeholder="เพิ่ม to-do..."
        onkeydown="if(event.key==='Enter')addStudyTask()"
        style="flex:1;min-width:0;margin:0;height:44px;padding:0 14px;">
      <button class="add-btn" onclick="addStudyTask()"

    </div>
    <div style="font-size:10px;color:var(--t3)">📅 Date จะถูกตั้งเป็นวันนี้อัตโนมัติ</div>
  </div>
</div>`:''}

${allSubjNames.length>1?`<div class="study-filter-row">
  <button class="study-chip${S.studyFilter==='all'?' on':''}" onclick="setStudyFilter('all')">ทั้งหมด ${activeTasks.length}</button>
  ${allSubjNames.map(s=>{
    const cnt=activeTasks.filter(t=>t.subject===s).length;
    return cnt>0?`<button class="study-chip${S.studyFilter===s?' on':''}" onclick="setStudyFilter('${s.replace(/'/g,"\\'")}')">

${S.studySync.loading?`<div class="spin">${S.studySync.status||'กำลังโหลด'}</div>`:''}
${!S.studySync.loading&&activeTasks.length===0&&!hasSubjects?`<div class="empty" style="margin-top:20px">
  ${S.cfg.studyDbId?'ยังไม่มี task<br><small style="color:#48484a">กด Sync เพื่อดึงข้อมูลจาก Notion</small>':'ตั้งค่า Study Planner Database ID<br>ใน Settings ก่อนนะ 📖'}
</div>`:''}

${allSubjNames.filter(s=>(groupBySubj[s]||[]).length>0).map(subj=>{
  const tasks=groupBySubj[subj]||[];
  if(!tasks.length)return'';
  const col=subjColor(subj);
  const collapsed=S.studyCollapsed[subj];
  const hasUrgent=tasks.some(t=>t.due&&new Date(t.due)<=new Date(today()));
  return`<div class="subject-card${collapsed?' collapsed':''}">
    <div class="subject-head" onclick="toggleStudyCollapse('${subj.replace(/'/g,"\\'")}')">

    <div class="study-task-row">
      <div class="study-sq${t.done?' on':''}" onclick="doneStudyTask('${t.id}')"></div>
      <div class="study-task-info">
        <div class="study-task-name${t.done?' on':''}">${t.title}</div>
        <div class="study-task-meta">
          ${dueBadge(t.due)}
          ${studyPriBadge(t.priority)}
        </div>
      </div>
    </div>`).join('')}
    </div>
  </div>`;
}).join('')}
<div style="height:12px"></div>`;

  switch(S.tab){
    case'habits':el.innerHTML=rHabits();setTimeout(initHabitDrag,10);break;
    case'timetable':el.innerHTML=rTimetable();ttInit();break;
    case'tasks':el.innerHTML=rTasks();setTimeout(initDrag,10);break;

    case'settings':el.innerHTML=rSettings();break;

// ── Tasks ──
const PRI_CYCLE={'!!!':'!!','!!':'!','!':'!!!'};
function priTag(id,p){
  if(p==='!!!')return`<span class="pri pri-h" onclick="cyclePri('${id}')">!!!</span>`;
  if(p==='!!')return`<span class="pri pri-m" onclick="cyclePri('${id}')">!!</span>`;
  return`<span class="pri pri-l" onclick="cyclePri('${id}')">!</span>`;
}
function cyclePri(id){
  const t=S.nTasks.find(t=>t.id==id);
  if(!t)return;
  t.priority=PRI_CYCLE[t.priority]||'!!!';
  save();render();
  // sync to Notion if not a local task
  if(!t.local&&S.cfg.workerUrl){
    const propVal=t.priority==='!!!'?'!!!':(t.priority==='!!'?'!!':'!');
    notionFetch('/pages/'+id,'PATCH',{properties:{priority:{status:{name:propVal}}}}).catch(()=>{});
  }
}
async function addLocalTask(){
  const el=document.getElementById('t-add-in');
  const priEl=document.getElementById('t-add-pri');
  if(!el||!el.value.trim())return;
  const title=el.value.trim();
  const priority=priEl?.value||'!!';
  const tmpId='local-'+Date.now();
  S.nTasks.unshift({id:tmpId,title,done:false,priority,local:true,date:today()});
  el.value='';save();render();setTimeout(initDrag,10);
  // Push to Notion if worker configured
  if(S.cfg.workerUrl){
    try{
      const res=await notionFetch('/pages','POST',{
        parent:{database_id:S.cfg.dbId},
        properties:{
          Name:{title:[{text:{content:title}}]},
          Done:{checkbox:false},
          priority:{status:{name:priority}},
          Date:{date:{start:today()}}
        }
      });
      if(res.id){
        // Replace tmpId with real Notion page id
        S.nTasks=S.nTasks.map(t=>t.id===tmpId?{...t,id:res.id,local:false}:t);
        save();render();setTimeout(initDrag,10);
      }
    }catch(e){
      // Keep as local if Notion fails
      console.warn('Notion create failed:',e.message);
    }
  }
}
function delTask(id,e){
  e.stopPropagation();
  S.nTasks=S.nTasks.filter(t=>t.id!=id);
  save();render();setTimeout(initDrag,10);
}
function doneTask(id){
  S.nTasks=S.nTasks.map(t=>t.id==id?{...t,done:true}:t);
  save();render();
  const t=S.nTasks.find(x=>x.id==id);
  if(t&&!t.local&&S.cfg.workerUrl){
    notionFetch('/pages/'+id,'PATCH',{properties:{Done:{checkbox:true}}}).catch(()=>{});
  }
}

// ── Drag & Drop ──
let DG={on:false,id:null,ghost:null,src:null,over:null,pos:'above',startY:0,rafId:null,touchY:0};

function initDrag(){
  document.querySelectorAll('[data-drag]').forEach(handle=>{
    handle.addEventListener('touchstart',e=>dragStart(e,handle.dataset.drag),{passive:false});
  });
}

function dragStart(e,id){
  e.preventDefault();
  const row=document.querySelector(`.t-row[data-id="${id}"]`);
  if(!row)return;
  const touch=e.touches[0];
  DG={on:true,id,src:row,over:null,pos:'above',startY:touch.clientY,touchY:touch.clientY,ghost:null,rafId:null};

  // Ghost
  const rect=row.getBoundingClientRect();
  const g=row.cloneNode(true);
  g.style.cssText=`position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;`+
    `z-index:999;pointer-events:none;background:#2c2c2e;border-radius:10px;`+
    `box-shadow:0 12px 40px rgba(0,0,0,.6);transition:none;opacity:.9;`;
  document.body.appendChild(g);
  DG.ghost=g;
  DG.originTop=rect.top;
  row.classList.add('dragging');

  document.addEventListener('touchmove',dragMove,{passive:false});
  document.addEventListener('touchend',dragEnd,{passive:true});
}

function dragMove(e){
  if(!DG.on)return;
  e.preventDefault();
  DG.touchY=e.touches[0].clientY;
  const dy=DG.touchY-DG.startY;
  DG.ghost.style.top=(DG.originTop+dy)+'px';

  // Find row under finger
  cancelAnimationFrame(DG.rafId);
  DG.rafId=requestAnimationFrame(()=>{
    const rows=[...document.querySelectorAll('.t-row[data-id]')];
    rows.forEach(r=>{r.classList.remove('drop-above','drop-below');});
    let found=null,pos='above';
    for(const r of rows){
      if(r===DG.src)continue;
      const b=r.getBoundingClientRect();
      if(DG.touchY>=b.top&&DG.touchY<=b.bottom){
        found=r;
        pos=DG.touchY<b.top+b.height/2?'above':'below';
        break;
      }
    }
    if(found){found.classList.add(pos==='above'?'drop-above':'drop-below');}
    DG.over=found;DG.pos=pos;
  });
}

function dragEnd(){
  if(!DG.on)return;
  DG.on=false;
  document.removeEventListener('touchmove',dragMove);
  document.removeEventListener('touchend',dragEnd);
  cancelAnimationFrame(DG.rafId);

  if(DG.ghost)DG.ghost.remove();
  document.querySelectorAll('.t-row').forEach(r=>{
    r.classList.remove('dragging','drop-above','drop-below');
  });

  if(DG.over&&DG.over!==DG.src){
    const toId=DG.over.dataset.id;
    const active=S.nTasks.filter(t=>!t.done);
    const done=S.nTasks.filter(t=>t.done);
    const fi=active.findIndex(t=>t.id===DG.id);
    const ti=active.findIndex(t=>t.id===toId);
    if(fi!==-1&&ti!==-1){
      const [moved]=active.splice(fi,1);
      const insertAt=DG.pos==='above'?ti:ti+1;
      active.splice(fi<ti?insertAt-1:insertAt,0,moved);
      S.nTasks=[...active,...done];
      save();
    }
  }
  DG={on:false,id:null,ghost:null,src:null,over:null,pos:'above',startY:0,touchY:0,rafId:null};
  render();
}

const TT_DAY={mon:{th:'วันจันทร์',en:'Monday'},tue:{th:'วันอังคาร',en:'Tuesday'},wed:{th:'วันพุธ',en:'Wednesday'},thu:{th:'วันพฤหัสบดี',en:'Thursday'},fri:{th:'วันศุกร์',en:'Friday'}};

function ttInit(){
  const dayMap={1:'mon',2:'tue',3:'wed',4:'thu',5:'fri'};
  const d=dayMap[new Date().getDay()];
  if(d){document.getElementById('tt-day-select').value=d;ttFilterDay(d);}
}
function ttSetWeek(w){
  const wrap=document.getElementById('tt-wrap');
  if(!wrap)return;
  wrap.className='tt-wrap week-'+w;
  document.getElementById('tt-btn-a').className='tt-week-btn a'+(w==='a'?' active':'');
  document.getElementById('tt-btn-b').className='tt-week-btn b'+(w==='b'?' active':'');
}
function ttShowFull(){
  document.getElementById('tt-grid').className='tt-days full';
  document.getElementById('tt-day-heading').classList.remove('visible');
  document.getElementById('tt-day-select').value='';
}
function ttFilterDay(val){
  if(!val){ttShowFull();return;}
  document.getElementById('tt-grid').className='tt-days single';
  document.querySelectorAll('.tt-col').forEach(c=>c.classList.remove('active'));
  const t=document.querySelector(`.tt-col[data-day="${val}"]`);
  if(t)t.classList.add('active');
  document.getElementById('tt-pill-th').textContent=TT_DAY[val]?.th||'';
  document.getElementById('tt-pill-en').textContent=TT_DAY[val]?.en||'';
  document.getElementById('tt-day-heading').classList.add('visible');
}
